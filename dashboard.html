<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <link rel="stylesheet" href="./styles/dashboard.css" />
  <script>
    if (window.self === window.top) {
      const page = location.pathname.split("/").pop() || "dashboard.html";
      window.location.replace("index.html?page=" + encodeURIComponent(page));
    }
  </script>
</head>

<body>
  <div class="dash">

    <section class="card">
      <div class="filter-bar">
        <input id="userFilter" type="text" placeholder="User name or ID" list="usersList" class="filter-input" />
        <datalist id="usersList"></datalist>
        <input id="customerFilter" type="text" placeholder="Customer name or ID" list="customersList" class="filter-input" />
        <datalist id="customersList"></datalist>
        <button id="applyFiltersBtn" class="btn-apply">Apply</button>
        <button id="clearFiltersBtn" class="btn-clear">Clear</button>
      </div>

      <div class="filter-details">
        <div class="fd-group">
          <label for="statusFilter">Status</label>
          <select id="statusFilter">
            <option value="">All Status</option>
            <option value="green">Green (&lt; 200 m)</option>
            <option value="yellow">Yellow (200–300 m)</option>
            <option value="red">Red (&gt; 300 m)</option>
          </select>
        </div>
        <div class="fd-group">
          <label for="reasonFilter">Reason</label>
          <select id="reasonFilter">
            <option value="">All Reasons</option>
            <option value="making_order">Making Order</option>
            <option value="delivering_order">Delivering Order</option>
            <option value="bill_collection">Bill Collection</option>
            <option value="receiving_returns">Receiving Returns</option>
          </select>
        </div>
        <div class="fd-group">
          <label for="dateStart">From</label>
          <input type="date" id="dateStart" />
        </div>
        <div class="fd-group">
          <label for="dateEnd">To</label>
          <input type="date" id="dateEnd" />
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-bar">
        <h3 class="section-heading">Visits</h3>
        <button id="exportBtn" class="btn-export" title="Export to Excel">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 384 512" aria-hidden="true">
            <path fill="currentColor" d="M369.9 97.98L286 14.1C277.5 5.6 266.2 0 254.4 0H48C21.49 0 0 21.49 0 48v416c0 26.5 21.49 48 48 48h288c26.5 0 48-21.5 48-48V131.6c0-12.7-5.1-24.9-14.1-33.62zM256 51.9 332.1 128H256V51.9zM231.1 352l-30.5-45.6-30.3 45.6H132.2l47.3-72-45.2-68h38.3l28.7 42.4 28.5-42.4h38l-45.2 68 47.4 72H231.1z"/>
          </svg>
          Export
        </button>
      </div>

      <div class="table-wrap">
        <table class="visits-table">
          <thead>
            <tr>
              <th>Status</th>
              <th>User</th>
              <th>Date</th>
              <th>Customer</th>
              <th>Reason</th>
              <th>Location</th>
              <th>Distance (m)</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="visitsTbody"></tbody>
        </table>
      </div>

      <div class="pager">
        <button id="prevPageBtn">Prev</button>
        <span id="pageInfo">Page 1</span>
        <button id="nextPageBtn">Next</button>
      </div>
    </section>

    <section class="card">
      <div class="section-bar">
        <div>
          <span class="chip" id="chartContext">Ranking</span>
          <h3 class="section-heading" id="chartTitle">Top 15</h3>
          <p class="muted" id="chartSubtitle"></p>
        </div>
        <div class="chart-controls">
          <select id="dataType">
            <option value="sales">Sales</option>
            <option value="leads">Orders</option>
          </select>
          <label class="switch hidden" id="personalWrap" title="Show your 12-month history">
            <input type="checkbox" id="personalToggle" />
            <span>Personal (12 months)</span>
          </label>
        </div>
      </div>
      <canvas id="delegatesChart"></canvas>
    </section>

    <section class="card" id="topDelegatesCard">
      <div class="section-bar">
        <h3 class="section-heading" id="topDelegatesTitle">Top 15 — All-time</h3>
        <button class="btn-add-order" onclick="window.location.href='create-order.html'">+ Add Order</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr id="delegatesHeadRow">
              <th>Name</th>
              <th>Total Amount</th>
              <th>Total Orders</th>
              <th id="thThisMonth">This Month</th>
            </tr>
          </thead>
          <tbody id="delegatesTable"></tbody>
        </table>
      </div>
    </section>

  </div>

  <div id="mapModal" class="modal">
    <div class="modal-content">
      <button id="closeMapBtn" class="modal-close">×</button>
      <div class="map-note-bar">
        <p id="mapNote">Note...</p>
      </div>
      <div id="map"></div>
    </div>
  </div>

  <script src="./scripts/dashboard.js"></script>
</body>

</html>
