<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Order Details</title>
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/view-order.css" />
  <link rel="icon" type="image/x-icon" href="./assets/GEM-Group-2024.ico" />
  <script src="./scripts/utils.js" defer></script>
  <script src="./scripts/view-order.js" defer></script>
  <script>
    function applyTheme(mode) {
      document.body.classList.toggle("dark-mode", mode === "dark");
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.theme) {
        applyTheme(event.data.theme);
        localStorage.setItem("theme", event.data.theme);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      applyTheme(localStorage.getItem("theme") || "light");
    });

    if (window.self === window.top) {
      const page = location.pathname.split("/").pop() || "view-order.html";
      window.location.replace("index.html?page=" + encodeURIComponent(page));
    }
  </script>
</head>

<body>
  <h2 class="page-heading">
    Order Details <span id="orderId"></span>
  </h2>

  <div class="order-info-grid">
    <div class="info-box">
      <div class="info-value" id="order-id"></div>
    </div>

    <div class="info-box">
      <div class="info-value" id="order-date"></div>
    </div>

    <div class="info-box">
      <div class="info-value" id="order-state"></div>
    </div>

    <div class="info-box">
      <div class="info-value" id="Delegate-name"></div>
    </div>
  </div>

  <!-- Customer Information -->
  <div class="customer-info">
    <h2 class="section-title">Customer Information</h2>

    <div class="info-boxes">
      <div class="info-group">
        <label>Name</label>
        <div class="info-value" id="customer-name"></div>
      </div>
      <div class="info-group">
        <label>ID</label>
        <div class="info-value" id="customer-id"></div>
      </div>
      <div class="info-group">
        <label>Address</label>
        <div class="info-value" id="customer-address"></div>
      </div>

      <div class="info-group">
        <label>Note</label>
        <div class="info-value" id="customer-note"></div>
      </div>
    </div>
  </div>

  <!-- Ordered Items -->
  <div class="items-list">
    <h2>Ordered Items</h2>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>No.</th>
            <th>Image</th>
            <th>Item Name</th>
            <th>Item Price</th>
            <th>Quantity</th>
            <th>Total Price</th>
          </tr>
        </thead>
        <tbody id="items-table-body">
          <!-- Items will be populated by JavaScript -->
        </tbody>

        <tfoot id="items-table-footer">
          <tr class="summary-row">
            <td colspan="4" class="summary-label">Total Quantity:</td>
            <td id="totalQuantityCount" class="summary-value"></td>
            <td class="summary-value"></td>
          </tr>
        </tfoot>
      </table>
    </div>

    <div class="card-view">
      <div id="items-card-view">
        <!-- Cards will be populated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- Total Price -->
  <div class="total">
    <p><strong>Total Amount:</strong></p>
    <div class="gray-box" id="total-price"></div>
  </div>

  <!-- Action Buttons -->
  <div class="order-actions horizontal-buttons">
    <button id="refund-order" class="refund-btn-outline">Refund</button>
    <button id="edit-order" class="edit-btn-outline">Edit</button>
    <button id="confirm-order" class="confirm-btn-outline">Confirm</button>
  </div>
</body>

</html>
