<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Create User</title>
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/create-user.css" />
  <script src="./scripts/utils.js" defer></script>
  <script src="./scripts/create-user.js" defer></script>
  <link rel="icon" href="./assets/GEM-Group-2024.ico" type="image/x-icon" />
  <script>
    function applyTheme(mode) {
      document.body.classList.toggle("dark-mode", mode === "dark");
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.theme) {
        applyTheme(event.data.theme);
        localStorage.setItem("theme", event.data.theme);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      applyTheme(localStorage.getItem("theme") || "light");
    });

    if (window.self === window.top) {
      const page = location.pathname.split("/").pop() || "create-user.html";
      window.location.replace("index.html?page=" + encodeURIComponent(page));
    }
  </script>
</head>

<body>
  <h2 class="page-heading">Add User</h2>

  <form id="create-user-form">
    <div class="form-field">
      <label for="username">Username:</label>
      <input type="text" id="username" name="username" autocomplete="username" required />
    </div>

    <div class="form-field">
      <label for="phone">Phone:</label>
      <input type="tel" id="phone" name="phone" autocomplete="tel" required />
    </div>

    <div class="form-field">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" autocomplete="email" required />
    </div>

    <div class="form-field">
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" autocomplete="new-password"
        placeholder="Leave empty to use default (123)" />
    </div>

    <div class="form-field">
      <label for="role">Role:</label>
      <select id="role" name="role" required>
        <option value="">Select Role</option>
        <option value="Delegate">Delegate</option>
        <option value="Supervisor">Supervisor</option>
        <option value="Manager">Manager</option>
        <option value="Financial">Financial</option>
        <option value="car">Car (Driver)</option>
      </select>
    </div>

    <div class="form-field">
      <label for="assigned-to">Assigned To (User):</label>
      <select id="assigned-to" name="assigned_to">
        <option value="">None</option>
      </select>
    </div>

    <fieldset class="flags-section">
      <legend>Permissions & Flags</legend>

      <div class="checkbox-group danger">
        <input type="checkbox" id="is-admin" name="admin" />
        <label for="is-admin">Is Admin</label>
      </div>

      <div class="checkbox-group" id="driver-group">
        <input type="checkbox" id="is-driver" name="driver" />
        <label for="is-driver">Driver</label>
      </div>
      <p class="mutex-note" id="driver-note">Requires role "Car (Driver)". Cannot combine with Storage.</p>

      <div class="checkbox-group" id="storage-group">
        <input type="checkbox" id="is-storage" name="storage" />
        <label for="is-storage">Storage User</label>
      </div>
      <p class="mutex-note">Can scan and prepare SAP orders. Cannot combine with Driver.</p>

      <div class="checkbox-group" id="storage-admin-group">
        <input type="checkbox" id="is-storage-admin" name="storage_admin" />
        <label for="is-storage-admin">Storage Admin</label>
      </div>
      <p class="mutex-note">Can review/confirm prepared SAP orders. Overrides "Storage User" if both checked.</p>
    </fieldset>

    <button type="submit" class="btn btn-add">
      Add User
    </button>
  </form>
</body>

</html>
