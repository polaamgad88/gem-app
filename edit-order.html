<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Edit Order</title>
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/edit-order.css" />
  <script src="./scripts/utils.js" defer></script>
  <script src="./scripts/edit-order.js" defer></script>
  <script>
    function applyTheme(mode) {
      document.body.classList.toggle("dark-mode", mode === "dark");
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.theme) {
        applyTheme(event.data.theme);
        localStorage.setItem("theme", event.data.theme);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      applyTheme(localStorage.getItem("theme") || "light");
    });

    if (window.self === window.top) {
      const page = location.pathname.split("/").pop() || "edit-order.html";
      window.location.replace("index.html?page=" + encodeURIComponent(page));
    }
  </script>
</head>

<body>
  <h2 class="page-heading">
    Edit Order <span id="orderId"></span>
  </h2>

  <div class="order-info-grid">
    <div class="info-box">
      <div class="info-value" id="order-id"></div>
    </div>

    <div class="info-box">
      <div class="info-value" id="order-date"></div>
    </div>

    <div class="info-box">
      <div class="info-value" id="order-state"></div>
    </div>

    <div class="info-box">
      <div class="info-value" id="Delegate-name"></div>
    </div>
  </div>

  <div class="customer-info">
    <h2>Customer Info</h2>

    <p><strong>Name:</strong> <span id="customer-name"></span></p>
    <p><strong>ID:</strong> <span id="customer-id"></span></p>

    <p>
      <strong>Address:</strong>
      <select id="customer-address-select" class="address-dropdown">
      </select>
    </p>

    <p>
      <strong>Note:</strong><br />
      <textarea id="customer-note" name="customer_note" placeholder="Add note for this order..."></textarea>
    </p>
  </div>

  <div class="items-list">
    <h2>Edit Items</h2>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Item</th>
            <th>Unit Price</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="editable-items-body">
        </tbody>
      </table>
    </div>

    <div class="card-view">
      <div id="editable-items-cards">
      </div>
    </div>

    <div class="add-product-wrap">
      <button id="add-product-btn" class="confirm-btn">
        Add Product
      </button>
    </div>
  </div>

  <div class="total">
    <h2>
      <span id="total-price">EGP 0</span>
    </h2>
  </div>

  <div class="action-buttons">
    <button id="save-order" class="confirm-btn">Confirm Changes</button>
  </div>
</body>

</html>
