<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delegate Dashboard</title>
  <link rel="icon" type="image/x-icon" href="./assets/GEM-Group-2024.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ── Reset & base ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8f9fb;
      color: #333;
    }

    body {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 250px;
      background-color: #fff;
      color: #0b2a59;
      display: flex;
      flex-direction: column;
      padding: 20px;
      border-right: 1px solid #ddd;
      transition: transform 0.3s ease, width 0.3s ease, padding 0.3s ease;
      flex-shrink: 0;
    }

    .sidebar.collapsed {
      transform: translateX(-100%);
      width: 0;
      padding: 0;
      overflow: hidden;
      border: none;
    }

    .logo {
      width: 120px;
      margin: 0 auto 10px;
      display: block;
      border-radius: 12px;
    }

    .sidebar h2 {
      font-size: 16px;
      text-align: center;
      margin-bottom: 4px;
    }

    .sidebar .version {
      align-self: center;
      color: gray;
      font-size: 12px;
      margin-bottom: 10px;
    }

    /* ── Nav links ── */
    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }

    .nav-links a {
      text-decoration: none;
      color: #192a56;
      padding: 12px 15px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s ease;
      font-size: 14px;
      white-space: nowrap;
    }

    .nav-links a:hover {
      background-color: #f0f4ff;
    }

    .nav-links a.active {
      background-color: #0b2a59;
      color: #fff;
    }

    .nav-links a.add-order {
      background-color: #28a745;
      color: #fff;
    }

    .nav-links a.add-order:hover {
      background-color: #218838;
    }

    /* ── Main area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      margin-left: 5px;
    }

    /* ── Topbar ── */
    .topbar {
      height: 60px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      margin: 15px 20px 0;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      flex-shrink: 0;
    }

    .topbar-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #333;
      margin: 0;
      font-weight: 600;
    }

    .topbar-title i.fa-bars {
      cursor: pointer;
      font-size: 18px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-top {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-theme {
      background: #eee;
    }

    .btn-logout {
      background: #db2a3c;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
    }

    /* ── Iframe content ── */
    .main-content {
      flex: 1;
      width: 100%;
      border: none;
      margin-top: 15px;
    }

    /* ── Dark mode ── */
    body.dark-mode {
      background-color: #121212;
      color: #e0e0e0;
    }

    body.dark-mode .sidebar {
      background-color: #1e1e1e;
      color: #ddd;
      border-right: 1px solid #444;
    }

    body.dark-mode .nav-links a {
      color: #ddd;
    }

    body.dark-mode .nav-links a:hover {
      background-color: #2a2a2a;
    }

    body.dark-mode .nav-links a.active {
      background-color: #1a3a6e;
    }

    body.dark-mode .topbar {
      background-color: #1e1e1e;
    }

    body.dark-mode .topbar-title {
      color: #ddd;
    }

    body.dark-mode .btn-theme {
      background: #333;
      color: #ddd;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        transform: translateX(-100%);
        z-index: 1000;
        width: 250px !important;
        padding: 20px !important;
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .main {
        flex: 1;
        width: 100%;
        margin-left: 0;
      }

      .topbar-title span#page-title {
        display: none;
      }
    }
  </style>

  <!-- Matomo analytics (must stay in <head>) -->
  <script>
    var _paq = window._paq = window._paq || [];
    _paq.push(["setDocumentTitle", document.domain + "/" + document.title]);
    _paq.push(["setCookieDomain", "*.dashboard-cristal.site"]);
    _paq.push(["trackPageView"]);
    _paq.push(["enableLinkTracking"]);
    (function () {
      var u = "//dashboard-cristal.site/stats/";
      _paq.push(["setTrackerUrl", u + "matomo.php"]);
      _paq.push(["setSiteId", "1"]);
      var d = document, g = d.createElement("script"), s = d.getElementsByTagName("script")[0];
      g.async = true; g.src = u + "matomo.js"; s.parentNode.insertBefore(g, s);
    })();
  </script>

  <script src="./scripts/utils.js"></script>
  <script src="./scripts/delegate-landing.js"></script>
</head>

<body>

  <!-- ── Sidebar ── -->
  <div class="sidebar">
    <img src="./assets/GEM Icon.jpg" alt="GEM logo" class="logo" />
    <h2>Welcome, <span id="username"></span> 👋</h2>
    <span class="version">version 3.3</span>
    <hr style="margin: 0 0 10px; border-color: #eee;" />

    <nav class="nav-links">
      <a href="./dashboard.html">
        <i class="fa-solid fa-chart-pie"></i> Overview
      </a>
      <a href="./reports.html">
        <i class="fa fa-chart-line"></i> Reports
      </a>
      <a href="./orders.html">
        <i class="fa-solid fa-list"></i> View Orders
      </a>
      <a href="./create-order.html" class="add-order">
        <i class="fa-solid fa-plus"></i> Add New Order
      </a>
      <a href="./customers.html">
        <i class="fa-solid fa-users"></i> Manage Customers
      </a>
      <a href="./users.html">
        <i class="fa-solid fa-user-gear"></i> Manage Users
      </a>
      <a href="./products.html" id="products_page" style="display: none;">
        <i class="fa-solid fa-box"></i> Manage Products
      </a>
      <a href="./customer-visit.html">
        <i class="fa-solid fa-location-dot"></i> Customer Visit
      </a>
      <a href="./scan-items.html">
        <i class="fa-solid fa-barcode"></i> Scan Items
      </a>
    </nav>
  </div>

  <!-- ── Main ── -->
  <div class="main">
    <div class="topbar">
      <h1 class="topbar-title">
        <i class="fa-solid fa-bars"></i>
        <span id="page-title">Company Dashboard</span>
      </h1>
      <div class="topbar-actions">
        <button id="theme-toggle" class="btn-top btn-theme">🌙 Dark</button>
        <a href="#" id="logout-btn" class="btn-logout">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
      </div>
    </div>

    <iframe id="main-frame" class="main-content" src="./dashboard.html"></iframe>
  </div>

  <script src="./scripts/app.js"></script>
</body>

</html>
