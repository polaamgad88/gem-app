<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1e3a5f" />
  <title>GEM Dashboard</title>
  <link rel="icon" type="image/x-icon" href="./assets/GEM-Group-2024.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="./styles/shell.css" />

  <script>
    var _paq = window._paq = window._paq || [];
    _paq.push(["setDocumentTitle", document.domain + "/" + document.title]);
    _paq.push(["setCookieDomain", "*.dashboard-cristal.site"]);
    _paq.push(["trackPageView"]);
    _paq.push(["enableLinkTracking"]);
    (function () {
      var u = "//dashboard-cristal.site/stats/";
      _paq.push(["setTrackerUrl", u + "matomo.php"]);
      _paq.push(["setSiteId", "1"]);
      var d = document, g = d.createElement("script"), s = d.getElementsByTagName("script")[0];
      g.async = true; g.src = u + "matomo.js"; s.parentNode.insertBefore(g, s);
    })();
  </script>

  <script src="./scripts/utils.js"></script>
  <script src="./scripts/delegate-landing.js"></script>
</head>

<body>

  <div id="overlay" class="overlay"></div>

  <aside id="drawer" class="drawer">
    <div class="drawer-brand">
      <img src="./assets/GEM Icon.jpg" alt="GEM" class="drawer-logo" />
      <p class="drawer-welcome">Welcome, <strong id="username"></strong></p>
      <span class="drawer-version">v3.7.0 Beta</span>
    </div>

    <nav id="nav" class="drawer-nav">
      <a href="./dashboard.html" data-page="dashboard.html">
        <i class="fa-solid fa-chart-pie"></i><span>Overview</span>
      </a>
      <a href="./reports.html" data-page="reports.html">
        <i class="fa-solid fa-chart-line"></i><span>Reports</span>
      </a>
      <a href="./orders.html" data-page="orders.html">
        <i class="fa-solid fa-list"></i><span>View Orders</span>
      </a>
      <a href="./create-order.html" data-page="create-order.html" class="nav-cta">
        <i class="fa-solid fa-plus"></i><span>Add New Order</span>
      </a>
      <a href="./customers.html" data-page="customers.html">
        <i class="fa-solid fa-users"></i><span>Manage Customers</span>
      </a>
      <a href="./users.html" data-page="users.html">
        <i class="fa-solid fa-user-gear"></i><span>Manage Users</span>
      </a>
      <a href="./products.html" data-page="products.html" id="products_page" style="display:none">
        <i class="fa-solid fa-box"></i><span>Manage Products</span>
      </a>
      <a href="./customer-visit.html" data-page="customer-visit.html">
        <i class="fa-solid fa-location-dot"></i><span>Customer Visit</span>
      </a>
      <a href="./scan-items.html" data-page="scan-items.html">
        <i class="fa-solid fa-barcode"></i><span>Scan Items</span>
      </a>
    </nav>
  </aside>

  <main class="stage">
    <header class="bar">
      <button id="hamburger" class="bar-hamburger" aria-label="Menu">
        <i class="fa-solid fa-bars"></i>
      </button>
      <span id="page-title" class="bar-title">Dashboard</span>
      <span id="region-badge" class="region-badge" style="display:none"></span>
      <div class="bar-right">
        <button id="theme-toggle" class="bar-btn">🌙 Dark</button>
        <a href="#" id="logout-btn" class="bar-btn bar-btn-logout">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span class="logout-label">Logout</span>
        </a>
      </div>
    </header>
    <iframe id="main-frame" class="stage-frame" src="./dashboard.html"></iframe>
  </main>

  <script src="./scripts/shell.js"></script>
</body>

</html>
