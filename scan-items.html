<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Scan Order Items</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/scan-items.css" />
  <script src="./scripts/scan-items.js" defer></script>

  <script>
    function applyTheme(mode) {
      if (mode === "dark") {
        document.body.classList.add("dark-mode");
      } else {
        document.body.classList.remove("dark-mode");
      }
    }

    window.addEventListener("message", (event) => {
      if (event.data.theme) {
        applyTheme(event.data.theme);
        localStorage.setItem("theme", event.data.theme);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      const savedTheme = localStorage.getItem("theme") || "light";
      applyTheme(savedTheme);
    });
  </script>
</head>

<body>
  <main class="scan-items-page">
    <section class="scan-items-container">
      <div class="page-header">
        <h1>Scan Order Items</h1>
        <p>Load a SAP order, scan items, review the final checked values, then finish.</p>
      </div>

      <section class="card order-search-card">
        <div class="section-title">Find SAP Order</div>

        <div class="order-search-row">
          <div class="field-group order-id-group">
            <label for="orderIdInput">SAP Order ID</label>
            <input type="text" id="orderIdInput" class="input" placeholder="Enter SAP order ID" autocomplete="off" />
          </div>

          <div class="search-btn-group">
            <button id="searchOrderBtn" class="btn btn-primary" type="button">
              Search
            </button>
            <button id="cancelSearchBtn" class="btn btn-light hidden" type="button">
              Cancel
            </button>
          </div>

          <div id="orderSearchLoader" class="search-loader hidden">
            <div class="spinner"></div>
            <span>Searching for order...</span>
          </div>

          <div id="orderSearchMessage" class="search-message hidden"></div>
        </div>
      </section>

      <section id="loadedOrderSection" class="card loaded-order-card hidden">
        <div class="section-title">Ordered Items</div>

        <div class="order-summary">
          <div><strong>Order ID:</strong> <span id="loadedOrderId">-</span></div>
          <div><strong>Status:</strong> <span id="loadedOrderStatus">-</span></div>
          <div><strong>Prepared By:</strong> <span id="loadedCustomerName">-</span></div>
        </div>

        <div class="table-wrapper">
          <table class="items-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Item</th>
                <th>Barcode</th>
                <th>Qty</th>
                <th>Before</th>
                <th>Final Checked</th>
                <th>Remaining</th>
                <th>-</th>
              </tr>
            </thead>
            <tbody id="orderedItemsTableBody">
            </tbody>
          </table>
        </div>

        <div class="barcode-method-block">
          <label class="method-label">Barcode Input Method</label>

          <div class="scanner-mode-switch" role="tablist" aria-label="Barcode input method">
            <button type="button" id="modeCameraBtn" class="mode-btn active" data-mode="camera">
              Scanner Camera
            </button>
            <button type="button" id="modeManualBtn" class="mode-btn" data-mode="manual">
              Manual Entry
            </button>
          </div>
        </div>

        <div class="scanner-submit-row">
          <div class="scanner-box">
            <label for="barcodeInput" class="scanner-main-label">Barcode Scanner / Camera</label>

            <div id="cameraModeSection" class="scanner-mode-panel">
              <div id="scannerCamera" class="scanner-camera">
                <video id="scannerVideo" class="scanner-video" autoplay playsinline muted></video>

                <div class="scanner-overlay">
                  <div class="barcode-finder">
                    <div class="finder-corner tl"></div>
                    <div class="finder-corner tr"></div>
                    <div class="finder-corner bl"></div>
                    <div class="finder-corner br"></div>
                    <div class="scan-line"></div>
                  </div>

                  <div class="scanner-hint">Move the finder over a barcode</div>
                </div>
              </div>

              <input type="text" id="barcodeInput" class="input" placeholder="Scanned barcode will appear here"
                autocomplete="off" />
            </div>

            <div id="manualModeSection" class="scanner-mode-panel hidden">
              <input type="text" id="manualBarcodeInput" class="input" placeholder="Enter barcode manually"
                autocomplete="off" />
            </div>
          </div>

          <div class="scanner-submit-btn scanner-submit-stack">
            <div class="scan-qty-block">
              <label for="scanQtyInput" class="scanner-main-label">Qty</label>
              <input type="number" id="scanQtyInput" class="input scan-qty-input" min="1" step="1" value="1" />
            </div>

            <button id="submitScanBtn" class="btn btn-secondary" type="button">
              Check
            </button>
          </div>
        </div>

        <div class="finish-row">
          <button id="startCheckingBtn" class="btn btn-primary" type="button">
            Start Checking
          </button>
          <button id="finishOrderBtn" class="btn btn-success" type="button">
            Finish
          </button>
        </div>
      </section>
    </section>
  </main>
</body>

</html>
