<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Users</title>
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/users.css" />
  <link rel="icon" href="./assets/GEM-Group-2024.ico" type="image/x-icon" />
  <script src="./scripts/utils.js" defer></script>
  <script src="./scripts/delegate-landing.js" defer></script>
  <script src="./scripts/users.js" defer></script>
  <script>
    function applyTheme(mode) {
      document.body.classList.toggle("dark-mode", mode === "dark");
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.theme) {
        applyTheme(event.data.theme);
        localStorage.setItem("theme", event.data.theme);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      applyTheme(localStorage.getItem("theme") || "light");
    });

    if (window.self === window.top) {
      const page = location.pathname.split("/").pop() || "users.html";
      window.location.replace("index.html?page=" + encodeURIComponent(page));
    }
  </script>
</head>

<body>
  <h1 class="page-heading">Users</h1>

  <div class="users-toolbar">
    <div class="toolbar-field">
      <label for="user-search">Search by Username:</label>
      <input type="search" id="user-search" placeholder="Type username..." />
    </div>

    <div class="toolbar-field">
      <button id="create-user-btn" type="button">
        Add User
      </button>
    </div>
  </div>

  <!-- Table View -->
  <div class="table-responsive">
    <table class="table">
      <thead>
        <tr>
          <th>Username</th>
          <th>Role</th>
          <th>Assigned To</th>
          <th>Phone</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="users-table-body">
        <!-- Filled by JS -->
      </tbody>
    </table>
  </div>

  <!-- Card View (Mobile) -->
  <div class="card-view" style="display: none">
    <div id="user-cards"></div>
  </div>

  <div id="change-password-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Change Password</h2>
      <form id="change-password-form">
        <input type="hidden" id="password-user-id" />
        <label>New Password: <input type="password" id="new-password" required /></label>
        <div class="modal-actions">
          <button type="submit" class="btn">Change</button>
          <button type="button" class="btn cancel-btn" onclick="closePasswordModal()">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Assign Number Modal -->
  <div id="assign-number-modal" class="modal hidden">
    <div class="modal-content">
      <span class="close" onclick="closeAssignNumberModal()">&times;</span>
      <h2>Assign Target</h2>

      <input type="hidden" id="assign-user-id" />

      <div class="form-group">
        <label for="local-number">Cairo Target Number</label>
        <input type="text" id="local-number" placeholder="Enter Target number" />
      </div>

      <div class="form-group">
        <label for="abroad-number">Region Target Number</label>
        <input type="text" id="abroad-number" placeholder="Enter Target number" />
      </div>

      <button onclick="submitAssignNumber()">Save</button>
    </div>
  </div>

  <div id="edit-user-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Edit User</h2>
      <form id="edit-user-form">
        <input type="hidden" id="edit-user-id" />
        <label>Username: <input type="text" id="edit-username" /></label>
        <label>Email: <input type="email" id="edit-email" /></label>
        <label>Phone: <input type="text" id="edit-phone" /></label>
        <label for="edit-role">Role:
          <select id="edit-role">
            <option value="Delegate">Delegate</option>
            <option value="Supervisor">Supervisor</option>
            <option value="Manager">Manager</option>
            <option value="Financial">Financial</option>
          </select>
        </label>
        <label>Assigned To (User ID): <input type="number" id="edit-assigned-to" /></label>
        <label><input type="checkbox" id="edit-admin" /> Admin</label>
        <label><input type="checkbox" id="edit-driver" /> Driver</label>
        <label><input type="checkbox" id="edit-storage" /> Storage</label>

        <div class="modal-actions">
          <button type="submit" class="btn">Save</button>
          <button type="button" class="btn cancel-btn" onclick="closeEditModal()">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</body>

</html>
