<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>New Order</title>
  <link rel="icon" type="image/x-icon" href="./assets/GEM-Group-2024.ico" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/create-order.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <script src="./scripts/utils.js" defer></script>
  <script src="./scripts/delegate-landing.js" defer></script>
  <script src="./scripts/create-order.js" defer></script>
  <script>
    function applyTheme(mode) {
      document.body.classList.toggle("dark-mode", mode === "dark");
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.theme) {
        applyTheme(event.data.theme);
        localStorage.setItem("theme", event.data.theme);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      applyTheme(localStorage.getItem("theme") || "light");
    });

    if (window.self === window.top) {
      const page = location.pathname.split("/").pop() || "create-order.html";
      window.location.replace("index.html?page=" + encodeURIComponent(page));
    }
  </script>
</head>

<body>
  <h2 class="page-heading">New Order</h2>

  <div class="order-header">
    <input type="date" id="order-date" class="responsive-input" readonly>

    <div class="custom-customer-select input-container">
      <input type="text" id="customer-search" placeholder="Search Customer..." autocomplete="off"
        class="responsive-input" />
      <ul id="customer-suggestions" class="dropdown-list"></ul>
    </div>

    <select id="customer-select" style="display: none;"></select>

    <select id="address-select" class="responsive-input">
      <option value="">Select Address</option>
    </select>
  </div>

  <div class="tabs">
    <div class="tab collapsible" onclick="toggleTab('detailed-order-content', 1)">
      Detailed Order <span class="arrow">▼</span>
    </div>
    <div id="detailed-order-content" class="tab-content collapsible">
      <div class="order-rows-scrollable order-rows-scrollable-detailed in-tab" id="detailed-order-rows"></div>

      <button class="add-row-btn primary" data-type="detailed">
        Add Row
      </button>
    </div>

    <div class="tab collapsible" onclick="toggleTab('combined-order', 1)">
      Combined Order <span class="arrow">▼</span>
    </div>
    <div id="combined-order" class="tab-content collapsible">
      <div class="order-rows-scrollable order-rows-scrollable-combined in-tab" id="combined-order-rows"></div>
      <button class="add-row-btn primary" data-type="combined">Add Row</button>
    </div>
  </div>

  <div class="note-section">
    <textarea id="order-note" name="order_note" placeholder="Add any special note..."></textarea>

    <div class="order-summary">
      <div class="summary-box items-box">
        <span class="summary-icon" aria-label="Total Items">📦</span>
        <span class="summary-label">Total Items:</span>
        <span id="total-items">0</span>
      </div>
      <div class="summary-box price-box">
        <span class="summary-icon" aria-label="Total Price">💰</span>
        <span class="summary-label">Total Price:</span>
        <span>EGP <span id="total-price">0.00</span></span>
      </div>
    </div>

    <div class="order-preview">
      <div id="preview-loader" style="display: none;">
        <div class="loader"></div>
        <span>Loading preview...</span>
      </div>

      <h3>Order Preview</h3>

      <div class="order-preview-container">
        <div id="order-preview-body" class="order-preview-cards"></div>
      </div>
    </div>

    <button id="submit-order" class="btn btn-primary">Submit New Order</button>

    <hr class="section-divider" />

    <div class="upload-heading">
      <h3>OR Upload from Excel</h3>
      <p>Import an order directly from a sheet</p>
    </div>

    <div id="upload-sheet-section">
      <label for="order-sheet">
        📄 Upload from Sheet
        <input type="file" id="order-sheet" accept=".xlsx,.xls" style="display: none;" />
      </label>
      <span id="selected-file-name">No file chosen</span>
    </div>
  </div>
</body>

</html>
