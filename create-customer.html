<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Create Customer</title>
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/create-customer.css" />
  <script src="./scripts/utils.js" defer></script>
  <script src="./scripts/create-customer.js" defer></script>
  <link rel="icon" type="image/x-icon" href="./assets/GEM-Group-2024.ico" />
  <script>
    function applyTheme(mode) {
      document.body.classList.toggle("dark-mode", mode === "dark");
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.theme) {
        applyTheme(event.data.theme);
        localStorage.setItem("theme", event.data.theme);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      applyTheme(localStorage.getItem("theme") || "light");
    });

    if (window.self === window.top) {
      const page = location.pathname.split("/").pop() || "create-customer.html";
      window.location.replace("index.html?page=" + encodeURIComponent(page));
    }
  </script>
</head>

<body>
  <h2 class="page-heading">Create New Customer</h2>

  <form id="create-customer-form">
    <label for="cc-first">First Name:</label>
    <input id="cc-first" type="text" name="first_name" required />

    <label for="cc-last">Last Name:</label>
    <input id="cc-last" type="text" name="last_name" required />

    <label for="cc-email">Email:</label>
    <input id="cc-email" type="email" name="email" autocomplete="email" />

    <label for="cc-phone">Phone:</label>
    <input id="cc-phone" type="tel" name="phone" autocomplete="tel" />

    <label for="cc-code">Code:</label>
    <input id="cc-code" type="text" name="code" required />

    <button type="submit">Create Customer</button>
  </form>

  <div id="success-message" class="success" style="display: none">
    ✅ Customer created successfully!
  </div>
  <div id="error-message" class="error" style="display: none"></div>
</body>

</html>
