<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Products</title>
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/products.css" />
  <link rel="icon" href="./assets/GEM-Group-2024.ico" type="image/x-icon" />
  <script src="./scripts/utils.js" defer></script>
  <script src="./scripts/delegate-landing.js" defer></script>
  <script src="./scripts/products.js" defer></script>
  <script>
    function applyTheme(mode) {
      document.body.classList.toggle("dark-mode", mode === "dark");
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.theme) {
        applyTheme(event.data.theme);
        localStorage.setItem("theme", event.data.theme);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      applyTheme(localStorage.getItem("theme") || "light");
    });

    if (window.self === window.top) {
      const page = location.pathname.split("/").pop() || "products.html";
      window.location.replace("index.html?page=" + encodeURIComponent(page));
    }
  </script>
</head>

<body>
  <h1 class="page-heading">Products</h1>

  <!-- Filters -->
  <div class="filters-row">
    <div class="filter-group">
      <select id="brand-filter">
        <option value="">All Brands</option>
      </select>
      <select id="category-filter">
        <option value="">All Categories</option>
      </select>
      <input id="barcode-search" type="search" placeholder="Enter barcode..." />
    </div>
  </div>

  <div class="actions-row text-right mb-4">
    <button class="btn btn-add" onclick="openAddProductDialog()">
      Add Product
    </button>
    <button id="export-open-btn" class="btn btn-add">
      Export Products
    </button>
    <button class="btn edit-btn" onclick="openImportDialog()">
      Import Products
    </button>
  </div>

  <!-- Table View -->
  <div class="table-responsive">
    <table class="table">
      <thead>
        <tr>
          <th>Image</th>
          <th>Product Name</th>
          <th>Item No.</th>
          <th>Brand</th>
          <th>Category</th>
          <th>Price</th>
          <th>Availability</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="productsTable"></tbody>
    </table>
  </div>

  <!-- Card View -->
  <div class="card-view" style="display: none">
    <div id="productCards"></div>
  </div>

  <div class="pagination" id="pagination"></div>

  <!-- Product Modal -->
  <div id="product-modal" class="modal" style="display: none">
    <div class="modal-content">
      <form id="product-form">
        <input type="hidden" id="product-id" />
        <div>
          <label>Product Name:</label>
          <input type="text" id="product-name" required />
        </div>
        <div>
          <label>Barcode:</label>
          <input type="number" id="bar-code" required />
        </div>
        <div>
          <label>Item Number:</label>
          <input type="text" id="item-number" />
        </div>

        <div>
          <label>Brand:</label>
          <input type="text" id="brand" required />
        </div>
        <div>
          <label>Category:</label>
          <input type="text" id="category" required />
        </div>
        <div>
          <label>Description:</label>
          <textarea id="description"></textarea>
        </div>
        <div>
          <label>Price:</label>
          <input type="number" step="0.01" id="price" required />
        </div>
        <div>
          <label>Order Limit:</label>
          <input type="number" id="product-order-limit" />
        </div>
        <div>
          <label>Availability Limit:</label>
          <input type="number" id="availability-limit" />
        </div>

        <div>
          <label>Image:</label>
          <input type="file" id="image" />
        </div>
        <div class="note-text" id="image-note">
          If you don't choose a new image, the existing image will be kept.
        </div>
        <div id="modal-error-message" class="note-text" style="color: var(--danger-color); display: none;"></div>

        <div class="modal-actions">
          <button type="submit" class="btn btn-add">Save</button>
          <button type="button" class="btn delete-btn" onclick="closeModal()">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="export-modal" class="modal" style="display: none">
    <div class="modal-content">
      <h2>Export Products</h2>
      <p>Choose what to export:</p>
      <div class="option-buttons">
        <button type="button" class="option-btn" data-value="all" onclick="selectExportOption(this)">
          All Products
        </button>
        <button type="button" class="option-btn" data-value="filtered" onclick="selectExportOption(this)">
          Filtered (Viewed) Products
        </button>
      </div>
      <div class="modal-actions">
        <button id="export-go-btn" class="btn btn-add">Export</button>
        <button class="btn delete-btn" onclick="closeExportDialog()">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <div id="import-modal" class="modal" style="display: none">
    <div class="modal-content">
      <h2>Import Products</h2>
      <p>Select Import Mode:</p>
      <div class="option-buttons">
        <button type="button" class="option-btn" data-value="update" onclick="selectImportOption(this)">
          Patch Edit Existing
        </button>
        <button type="button" class="option-btn" data-value="add" onclick="selectImportOption(this)">
          Patch Add New
        </button>
      </div>
      <div style="margin-top: var(--spacing-md)">
        <label>Select File (Excel / CSV):</label>
        <input type="file" id="import-file" />
      </div>
      <div style="margin-top: var(--spacing-md)">
        <label>Select Images ZIP:</label>
        <input type="file" id="images-zip" accept=".zip" />
      </div>

      <div class="modal-actions">
        <button class="btn btn-add" onclick="handleImport()">Upload</button>
        <button class="btn delete-btn" onclick="closeImportDialog()">
          Cancel
        </button>
      </div>
      <div id="import-error-message" class="note-text" style="color: var(--danger-color); display: none;"></div>
    </div>
  </div>
</body>

</html>
