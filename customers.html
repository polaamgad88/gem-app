<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Customers</title>
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/customers.css" />
  <link rel="icon" href="./assets/GEM-Group-2024.ico" type="image/x-icon" />
  <script src="./scripts/utils.js" defer></script>
  <script src="./scripts/delegate-landing.js" defer></script>
  <script src="./scripts/customers.js" defer></script>
  <script>
    function applyTheme(mode) {
      document.body.classList.toggle("dark-mode", mode === "dark");
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.theme) {
        applyTheme(event.data.theme);
        localStorage.setItem("theme", event.data.theme);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      applyTheme(localStorage.getItem("theme") || "light");
    });

    if (window.self === window.top) {
      const page = location.pathname.split("/").pop() || "customers.html";
      window.location.replace("index.html?page=" + encodeURIComponent(page));
    }
  </script>
</head>

<body>
  <h2 class="page-heading">Customers</h2>

  <div class="search-actions-row">
    <input id="customer-search" type="search" class="input-full" placeholder="Search by name or code..." />
    <button id="add-customer-btn" class="btn btn-add full-width">
      Add Customer
    </button>
  </div>

  <!-- Table View -->
  <div class="table-responsive">
    <table class="table">
      <thead>
        <tr>
          <th>Code</th>
          <th>Customer Name</th>
          <th>Phone</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="customersTable">
        <!-- Table content by JS -->
      </tbody>
    </table>
  </div>

  <!-- Card View (Mobile) -->
  <div class="card-view" style="display: none">
    <div id="customerCards">
      <!-- Card content by JS -->
    </div>
  </div>
</body>

</html>
