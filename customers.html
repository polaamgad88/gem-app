<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Customers</title>
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/customers.css" />
  <link rel="icon" href="./assets/GEM-Group-2024.ico" type="image/x-icon" />
  <script src="./scripts/utils.js" defer></script>
  <script src="./scripts/delegate-landing.js" defer></script>
  <script src="./scripts/customers.js" defer></script>
  <script>
    function applyTheme(mode) {
      document.body.classList.toggle("dark-mode", mode === "dark");
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.theme) {
        applyTheme(event.data.theme);
        localStorage.setItem("theme", event.data.theme);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      applyTheme(localStorage.getItem("theme") || "light");
    });

    if (window.self === window.top) {
      const page = location.pathname.split("/").pop() || "customers.html";
      window.location.replace("index.html?page=" + encodeURIComponent(page));
    }
  </script>
</head>

<body>
  <div class="page-head">
    <h2 class="page-heading">Customers</h2>
    <button id="add-customer-btn" type="button" class="primary-btn">
      <i>+</i><span>Add Customer</span>
    </button>
  </div>

  <div class="customers-toolbar">
    <div class="toolbar-field toolbar-field--grow">
      <label for="customer-search">Search</label>
      <input type="search" id="customer-search" placeholder="Name, code or phone..." />
    </div>

    <div class="toolbar-field toolbar-field--narrow">
      <label for="page-size">Per page</label>
      <select id="page-size">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>
  </div>

  <p id="result-meta" class="result-meta"></p>

  <div class="table-responsive">
    <table class="table">
      <thead>
        <tr>
          <th class="col-code">Code</th>
          <th>Customer</th>
          <th class="col-phone">Phone</th>
          <th class="col-reps">Assigned To</th>
          <th class="col-action"></th>
        </tr>
      </thead>
      <tbody id="customersTable"></tbody>
    </table>
  </div>

  <div class="card-view" style="display: none">
    <div id="customerCards"></div>
  </div>

  <p id="customers-empty" class="empty-state hidden">No customers found.</p>
  <div id="customers-loading" class="loading-state">
    <div class="spinner"></div><span>Loading customers...</span>
  </div>
</body>

</html>
