<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Orders</title>
  <link rel="icon" type="image/x-icon" href="./assets/GEM-Group-2024.ico" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/orders.css" />
  <script src="./scripts/utils.js" defer></script>
  <script src="./scripts/delegate-landing.js" defer></script>
  <script src="./scripts/orders.js" defer></script>
  <script>
    function applyTheme(mode) {
      document.body.classList.toggle("dark-mode", mode === "dark");
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.theme) {
        applyTheme(event.data.theme);
        localStorage.setItem("theme", event.data.theme);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      applyTheme(localStorage.getItem("theme") || "light");
    });

    if (window.self === window.top) {
      const page = location.pathname.split("/").pop() || "orders.html";
      window.location.replace("index.html?page=" + encodeURIComponent(page));
    }
  </script>

</head>

<body>
  <div id="loader" style="display: none">
    <div class="loader"></div>
    <strong>Loading orders...</strong>
  </div>

  <h2 class="page-heading">Orders</h2>

  <div class="filters">
    <div class="filter-group">
      <label for="userFilter">Filter by User:</label>
      <select id="userFilter">
        <option value="all">All Users</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="customerFilter">Filter by Customer:</label>
      <select id="customerFilter">
        <option value="all">All Customers</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="dateStart">Order Date From:</label>
      <input type="date" id="dateStart" />
    </div>

    <div class="filter-group">
      <label for="dateEnd">Order Date To:</label>
      <input type="date" id="dateEnd" />
    </div>

    <div class="filter-group">
      <label for="updateDateStart">Update Date From:</label>
      <input type="date" id="updateDateStart" />
    </div>

    <div class="filter-group">
      <label for="updateDateEnd">Update Date To:</label>
      <input type="date" id="updateDateEnd" />
    </div>

    <div class="filter-group">
      <label for="pageSize">Entries per page:</label>
      <select id="pageSize">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="confirmedToggle">Show:</label>
      <button id="confirmedToggle" class="toggle-btn">
        All Orders
      </button>
    </div>
  </div>

  <div class="export-wrapper">
    <button id="exportBtn" class="export-btn" title="Export to Excel">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" aria-hidden="true">
        <path fill="#fff" d="M369.9 97.98L286 14.1C277.5 5.6 266.2 0 254.4 0H48C21.49 0 0 21.49 0 48v416c0 26.5 21.49 48 48 48h288c26.5 0 48-21.5 48-48V131.6c0-12.7-5.1-24.9-14.1-33.62zM256 51.9 332.1 128H256V51.9zM231.1 352l-30.5-45.6-30.3 45.6H132.2l47.3-72-45.2-68h38.3l28.7 42.4 28.5-42.4h38l-45.2 68 47.4 72H231.1z" />
      </svg>
      <p>DOWNLOAD</p>
    </button>
  </div>

  <div class="table-responsive">
    <table class="table">
      <thead>
        <tr>
          <th><input type="checkbox" id="checkAll" /></th>
          <th>Order&nbsp;ID</th>
          <th class="sortable" onclick="sortTable(2,'date')">
            Date ⬍
          </th>
          <th>Customer</th>
          <th>Delegate</th>
          <th>Role</th>
          <th>Status</th>
          <th class="sortable" onclick="sortTable(7,'price')">
            Total ⬍
          </th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="ordersTable"></tbody>
      <tfoot>
        <tr id="orderSummaryRow">
          <td colspan="9"></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="card-view" style="display: none">
    <div id="ordersCards"></div>
    <div id="cardSummary"></div>
  </div>

  <div id="pagination" class="pagination-controls">
  </div>

  <div id="exportModal" class="modal hidden">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>Export Orders</h2>
      <form id="exportForm">
        <div class="form-group">
          <label for="modalCustomer">Customer</label>
          <input list="modalCustomerList" id="modalCustomer" placeholder="Type to filter" />
          <datalist id="modalCustomerList"></datalist>
        </div>
        <div class="form-group">
          <label for="modalUser">User</label>
          <input list="modalUserList" id="modalUser" placeholder="Type to filter" />
          <datalist id="modalUserList"></datalist>
        </div>
        <div class="form-group">
          <label>Amount&nbsp;(EGP)</label>
          <div class="export-modal-row">
            <input type="number" id="amountStart" placeholder="From" />
            <input type="number" id="amountEnd" placeholder="To" />
          </div>
        </div>
        <div class="form-group">
          <label>Create Date range</label>
          <div class="export-modal-row">
            <input type="date" id="dateStart" />
            <input type="date" id="dateEnd" />
          </div>
        </div>
        <div class="form-group">
          <label>Update Date range</label>
          <div class="export-modal-row">
            <input type="date" id="dateStartUpdate" placeholder="From" />
            <input type="date" id="dateEndUpdate" placeholder="To" />
          </div>
        </div>
        <div class="form-group checkbox-inline">
          <input type="checkbox" id="fullyconfirmed" />
          <label for="fullyconfirmed">Only Fully Confirmed Orders</label>
        </div>
        <button type="submit" class="export-btn">
          Export
        </button>
      </form>
    </div>
  </div>
</body>

</html>
