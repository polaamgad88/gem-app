<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Orders</title>
  <link rel="icon" type="image/x-icon" href="./assets/GEM-Group-2024.ico" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/orders.css" />
  <script src="./scripts/utils.js" defer></script>
  <script src="./scripts/delegate-landing.js" defer></script>
  <script src="./scripts/orders.js" defer></script>
  <script>
    function applyTheme(mode) {
      document.body.classList.toggle("dark-mode", mode === "dark");
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.theme) {
        applyTheme(event.data.theme);
        localStorage.setItem("theme", event.data.theme);
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      applyTheme(localStorage.getItem("theme") || "light");
    });

    if (window.self === window.top) {
      const page = location.pathname.split("/").pop() || "orders.html";
      window.location.replace("index.html?page=" + encodeURIComponent(page));
    }
  </script>
</head>

<body>
  <div id="topProgress" class="top-progress" hidden></div>

  <div class="page-head">
    <h2 class="page-heading">Orders</h2>
    <div class="head-actions">
      <button id="confirmedToggle" type="button" class="ghost-btn">All Orders</button>
      <button id="exportBtn" type="button" class="primary-btn" title="Export to Excel">
        <span aria-hidden="true">⤓</span><span>Export</span>
      </button>
    </div>
  </div>

  <div id="summary-row" class="summary-row"></div>

  <div class="filters-bar">
    <div class="toolbar-field toolbar-field--grow">
      <input type="search" id="orderSearch" placeholder="Search order no, customer or delegate..." />
    </div>
    <div class="segmented" id="dateFieldSwitch" role="group" aria-label="Date column shows">
      <button type="button" data-field="update_date" class="active">Updated</button>
      <button type="button" data-field="order_date">Created</button>
    </div>
    <button id="filtersToggle" type="button" class="filters-toggle" aria-expanded="false">
      <span class="chev" aria-hidden="true"></span>
      <span>Filters</span>
      <span id="filtersCount" class="filters-count hidden">0</span>
    </button>
    <button id="resetFilters" type="button" class="ghost-btn">Reset</button>
  </div>

  <div id="filtersPanel" class="filters hidden">
    <div class="filter-group">
      <label for="userFilter">Delegate</label>
      <select id="userFilter">
        <option value="all">All users</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="customerFilter">Customer</label>
      <select id="customerFilter">
        <option value="all">All customers</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="dateStart">Order date from</label>
      <input type="date" id="dateStart" />
    </div>

    <div class="filter-group">
      <label for="dateEnd">Order date to</label>
      <input type="date" id="dateEnd" />
    </div>

    <div class="filter-group">
      <label for="updateDateStart">Update date from</label>
      <input type="date" id="updateDateStart" />
    </div>

    <div class="filter-group">
      <label for="updateDateEnd">Update date to</label>
      <input type="date" id="updateDateEnd" />
    </div>

    <div class="filter-group filter-group--narrow">
      <label for="pageSize">Per page</label>
      <select id="pageSize">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>
  </div>

  <p id="resultMeta" class="result-meta"></p>

  <div id="selectionBar" class="selection-bar hidden">
    <span id="selectionCount">0 selected</span>
    <button id="exportSelected" type="button" class="ghost-btn">Export selected</button>
    <button id="clearSelection" type="button" class="link-btn">Clear</button>
  </div>

  <div class="table-responsive">
    <table class="table">
      <thead>
        <tr>
          <th class="col-check"><input type="checkbox" id="checkAll" aria-label="Select all" /></th>
          <th class="col-id">Order</th>
          <th class="col-date sortable" data-sort="date" id="dateColumnHeader">Updated</th>
          <th>Customer</th>
          <th class="col-user">Delegate</th>
          <th class="col-status">Status</th>
          <th class="col-total sortable" data-sort="price">Total</th>
          <th class="col-action"></th>
        </tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </div>

  <div class="card-view" style="display: none">
    <div id="ordersCards"></div>
  </div>

  <p id="ordersEmpty" class="empty-state hidden">No orders match these filters.</p>

  <div id="pagination" class="pagination-controls"></div>

  <div id="exportModal" class="modal hidden">
    <div class="modal-content">
      <h2>Export Orders</h2>
      <form id="exportForm">
        <div class="form-group">
          <label for="modalCustomer">Customer</label>
          <input list="modalCustomerList" id="modalCustomer" placeholder="Type to filter" />
          <datalist id="modalCustomerList"></datalist>
        </div>
        <div class="form-group">
          <label for="modalUser">User</label>
          <input list="modalUserList" id="modalUser" placeholder="Type to filter" />
          <datalist id="modalUserList"></datalist>
        </div>
        <div class="form-group">
          <label>Amount (EGP)</label>
          <div class="export-modal-row">
            <input type="number" id="amountStart" placeholder="From" />
            <input type="number" id="amountEnd" placeholder="To" />
          </div>
        </div>
        <div class="form-group">
          <label>Order date range</label>
          <div class="export-modal-row">
            <input type="date" id="exportDateStart" />
            <input type="date" id="exportDateEnd" />
          </div>
        </div>
        <div class="form-group">
          <label>Update date range</label>
          <div class="export-modal-row">
            <input type="date" id="exportUpdateStart" />
            <input type="date" id="exportUpdateEnd" />
          </div>
        </div>
        <label class="check-row">
          <input type="checkbox" id="fullyconfirmed" /> Only fully confirmed orders
        </label>

        <div class="modal-actions">
          <button type="submit" class="btn primary-btn">Export</button>
          <button type="button" class="btn cancel-btn" data-close="exportModal">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</body>

</html>
