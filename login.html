<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b2a59" />
  <link rel="icon" type="image/x-icon" href="./assets/GEM-Group-2024.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="./styles/login.css" />
  <script src="./scripts/utils.js" defer></script>
  <script src="./scripts/login.js" defer></script>

  <title>Login | GEM App</title>
</head>

<body>
  <div class="top-circle"></div>

  <div class="header-title">Welcome to GEM Application</div>
  <div class="header-sub">Please log in to continue</div>

  <div class="container">
    <img src="./assets/GEM Group 2024.jpg" alt="GEM Logo" class="logo" />
    <form>
      <input type="text" name="username" placeholder="Username" autocomplete="username" required />
      <div class="password-container">
        <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required />
        <i class="fa-solid fa-eye" id="togglePassword" role="button" tabindex="0" aria-label="Toggle password visibility"></i>
      </div>

      <button type="submit" class="btn btn-primary">Login</button>
    </form>
  </div>
  <span class="version-tag">version 3.6.1 Beta</span>
  <div class="footer">© 2025 GEM Group. All rights reserved.</div>
</body>

</html>
